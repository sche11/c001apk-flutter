name: Auto Build and Release

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - "README.md"
      - ".gitignore"

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------
  # 1. 检测是否需要发布
  # -----------------------------------------------------------
  check-release:
    name: Check Release Needed
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      release_tag: ${{ steps.check.outputs.release_tag }}
      changelog: ${{ steps.changelog.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for feat/fix commits
        id: check
        run: |
          # 获取上一个 release 标签
          PREV_TAG=$(git tag -l "release-*" --sort=-v:refname | head -1 || echo "")
          echo "Previous Release Tag: $PREV_TAG"
          
          # 获取提交记录
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"%s")
          fi
          
          echo "Recent commits:"
          echo "$COMMITS"
          
          # 检测 feat 或 fix
          HAS_CHANGE=$(echo "$COMMITS" | grep -iE "^(feat|fix)(\(.*\))?:" || true)
          
          if [ -n "$HAS_CHANGE" ]; then
            echo "✅ Found feat/fix commits, will release"
            echo "should_release=true" >> $GITHUB_OUTPUT
            
            # 生成 release 标签 (release- 日期 - 短 hash)
            SHORT_HASH=$(git rev-parse --short HEAD)
            DATE=$(date +%Y%m%d)
            RELEASE_TAG="release-${DATE}-${SHORT_HASH}"
            echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
            echo "Release Tag: $RELEASE_TAG"
          else
            echo "⚠️ No feat/fix commits, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Changelog
        id: changelog
        if: steps.check.outputs.should_release == 'true'
        run: |
          PREV_TAG=$(git tag -l "release-*" --sort=-v:refname | head -1 || echo "")
          
          echo "## 🚀 Auto Release" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "**Tag:** ${{ steps.check.outputs.release_tag }}" >> CHANGELOG.md
          echo "**Date:** $(date '+%Y-%m-%d %H:%M:%S')" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Changes" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          
          if [ -z "$PREV_TAG" ]; then
            echo "🎉 Initial release" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s" >> CHANGELOG.md
          else
            echo "Changes since $PREV_TAG:" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s" >> CHANGELOG.md
          fi
          
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # -----------------------------------------------------------
  # 2. 构建任务 (仅当需要发布时运行)
  # -----------------------------------------------------------
  build-android:
    name: Build Android
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v3
        with:
          channel: 'stable'
          cache: true
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi
      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk

  build-windows:
    name: Build Windows
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v3
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/
          compression-level: 9

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v3
        with:
          channel: 'stable'
          cache: true
      - run: |
          sudo apt update -y
          sudo apt install -y libgtk-3-dev libblkid-dev liblzma-dev ninja-build clang cmake
          flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-build
          path: build/linux/${{ matrix.arch }}/release/bundle/
          compression-level: 9

  build-macos:
    name: Build macOS
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v3
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Get App Name
        id: app_name
        run: |
          NAME=$(grep "^name:" pubspec.yaml | head -1 | awk '{print $2}')
          echo "name=$NAME" >> $GITHUB_OUTPUT
      - name: Create DMG
        run: |
          hdiutil create -format UDZO -srcfolder "build/macos/Build/Products/Release/${{ steps.app_name.outputs.name }}.app" ${{ steps.app_name.outputs.name }}.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ steps.app_name.outputs.name }}.dmg

  # -----------------------------------------------------------
  # 3. 发布 (打标签 + 创建 Release)
  # -----------------------------------------------------------
  publish:
    name: Create Release
    needs: [check-release, build-android, build-windows, build-linux, build-macos]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare Desktop Files (Zip)
        run: |
          cd ./artifacts
          zip_folder() {
            if [ -d "$1" ]; then
              cd "$1" && zip -r "../$1.zip" . && cd ..
              rm -rf "$1"
            fi
          }
          zip_folder "windows-build"
          zip_folder "linux-x64-build"
          zip_folder "linux-arm64-build"
          cd ..

      - name: Create and Push Tag
        run: |
          RELEASE_TAG="${{ needs.check-release.outputs.release_tag }}"
          echo "Creating tag: $RELEASE_TAG"
          git tag -a "$RELEASE_TAG" -m "Auto release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check-release.outputs.release_tag }}
          name: "Auto Release ${{ needs.check-release.outputs.release_tag }}"
          body: ${{ needs.check-release.outputs.changelog }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/**/*.apk
            ./artifacts/**/*.zip
            ./artifacts/**/*.dmg
