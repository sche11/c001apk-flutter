name: Auto Build and Release

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - "README.md"
      - ".gitignore"

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-release:
    name: Check Release Needed
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      release_tag: ${{ steps.check.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for feat/fix commits
        id: check
        run: |
          PREV_TAG=$(git tag -l "release-*" --sort=-v:refname | head -1 || echo "")
          echo "Previous Release Tag: $PREV_TAG"
          
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"%s")
          fi
          
          echo "Recent commits:"
          echo "$COMMITS"
          
          HAS_CHANGE=$(echo "$COMMITS" | grep -iE "^(feat|fix)(\(.*\))?:" || true)
          
          if [ -n "$HAS_CHANGE" ]; then
            echo "✅ Found feat/fix commits, will release"
            echo "should_release=true" >> $GITHUB_OUTPUT
            
            SHORT_HASH=$(git rev-parse --short HEAD)
            DATE=$(date +%Y%m%d)
            RELEASE_TAG="release-${DATE}-${SHORT_HASH}"
            echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
            echo "Release Tag: $RELEASE_TAG"
          else
            echo "⚠️ No feat/fix commits, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Changelog File
        if: steps.check.outputs.should_release == 'true'
        run: |
          PREV_TAG=$(git tag -l "release-*" --sort=-v:refname | head -1 || echo "")
          
          {
            echo "## 🚀 Auto Release"
            echo ""
            echo "**Tag:** ${{ steps.check.outputs.release_tag }}"
            echo "**Date:** $(date '+%Y-%m-%d %H:%M:%S')"
            echo ""
            echo "### Changes"
            echo ""
            
            if [ -z "$PREV_TAG" ]; then
              echo "🎉 Initial release"
              echo ""
              git log --pretty=format:"- %s"
            else
              echo "Changes since $PREV_TAG:"
              echo ""
              git log ${PREV_TAG}..HEAD --pretty=format:"- %s"
            fi
          } > CHANGELOG.md
          
          echo "📄 Changelog generated:"
          cat CHANGELOG.md

      - name: Upload Changelog
        if: steps.check.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: changelog-file
          path: CHANGELOG.md
          retention-days: 1

  build-android:
    name: Build Android
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi
      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk

  build-windows:
    name: Build Windows
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/
          compression-level: 9

  publish:
    name: Create Release
    needs: [check-release, build-android, build-windows]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download Changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog-file
          path: ./

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare Desktop Files (Zip)
        run: |
          cd ./artifacts
          zip_folder() {
            if [ -d "$1" ]; then
              cd "$1" && zip -r "../$1.zip" . && cd ..
              rm -rf "$1"
            fi
          }
          zip_folder "windows-build"
          cd ..

      - name: Create and Push Tag
        run: |
          RELEASE_TAG="${{ needs.check-release.outputs.release_tag }}"
          echo "Creating tag: $RELEASE_TAG"
          git tag -a "$RELEASE_TAG" -m "Auto release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check-release.outputs.release_tag }}
          name: "Auto Release ${{ needs.check-release.outputs.release_tag }}"
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            ./artifacts/**/*.apk
            ./artifacts/**/*.zip
